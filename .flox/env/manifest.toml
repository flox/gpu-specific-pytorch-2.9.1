# PyTorch 2.9.1 Custom Build Environment
# Build targeted PyTorch variants with CUDA 12.9 and architecture-specific optimizations

version = 1

[install]
# Build dependencies
git.pkg-path = "git"
cmake.pkg-path = "cmake"
ninja.pkg-path = "ninja"
pkg-config.pkg-path = "pkg-config"
cacert.pkg-path = "cacert"

# Python environment
python3.pkg-path = "python313Full"
uv.pkg-path = "uv"

# Compiler toolchain
gcc.pkg-path = "gcc"
gcc.priority = 1

# Additional build tools
which.pkg-path = "which"
gnumake.pkg-path = "gnumake"
coreutils.pkg-path = "coreutils"
gnused.pkg-path = "gnused"
gawk.pkg-path = "gawk"
findutils.pkg-path = "findutils"
gnutar.pkg-path = "gnutar"
gzip.pkg-path = "gzip"
bzip2.pkg-path = "bzip2"
xz.pkg-path = "xz"
gnupatch.pkg-path = "gnupatch"
gnugrep.pkg-path = "gnugrep"
diffutils.pkg-path = "diffutils"
file.pkg-path = "file"

[vars]
NIXPKGS_ALLOW_UNFREE = "1"  # Required for CUDA packages

[hook]
on-activate = '''
echo "========================================="
echo "PyTorch 2.9.1 Build Environment (CUDA 12.9)"
echo "========================================="
echo ""
echo "Available build commands:"
echo "  flox build <variant>"
echo ""
echo "GPU variants (CUDA 12.9, custom per-SM MAGMA):"
echo "  pytorch-python313-cuda12_9-sm120-avx2     # Vera Rubin (R100)"
echo "  pytorch-python313-cuda12_9-sm100-avx2     # Blackwell (B200)"
echo "  pytorch-python313-cuda12_9-sm90-avx2      # Hopper (H100, L40S)"
echo "  pytorch-python313-cuda12_9-sm89-avx2      # Ada (RTX 4090, L40)"
echo "  pytorch-python313-cuda12_9-sm86-avx2      # Ampere (RTX 3090, A40)"
echo "  pytorch-python313-cuda12_9-sm80-avx2      # Ampere (A100, A30)"
echo "  pytorch-python313-cuda12_9-sm75-avx2      # Turing (T4, RTX 2080 Ti)"
echo "  pytorch-python313-cuda12_9-sm61-avx2      # Pascal (P40, GTX 1080 Ti)"
echo "  (avx512 variants also available for SM75-SM120)"
echo ""
echo "CPU-only variants:"
echo "  pytorch-python313-cpu-avx2                # x86-64 broad compat"
echo "  pytorch-python313-cpu-avx512              # x86-64 modern CPUs"
echo "  pytorch-python313-cpu-armv8_2             # ARM Graviton2"
echo "  pytorch-python313-cpu-armv9               # ARM Grace/Graviton3+"
echo ""
echo "macOS variants:"
echo "  pytorch-python313-darwin-mps              # Apple Silicon (M1-M4)"
echo "========================================="
'''

[profile]
common = '''
# Helper functions for building and testing
build_variant() {
    local variant="$1"
    echo "Building PyTorch 2.9.1 variant: $variant"
    flox build "$variant"
}

test_variant() {
    local variant="$1"
    if [ -f "./test-build.sh" ]; then
        ./test-build.sh "$variant"
    else
        echo "Test script not found. Run: ./create-test-scripts.sh"
    fi
}

list_variants() {
    echo "Available PyTorch 2.9.1 variants:"
    ls -1 .flox/pkgs/*.nix 2>/dev/null | xargs -n1 basename | sed 's/.nix$//' | sort
}

# Export helper functions
export -f build_variant
export -f test_variant
export -f list_variants
'''

[options]
systems = ["x86_64-linux", "aarch64-linux", "aarch64-darwin"]
